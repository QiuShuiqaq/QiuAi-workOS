services:
  postgres:
    image: postgres:16-alpine
    container_name: qiuai-workos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qiuai_workos
      POSTGRES_USER: qiuai
      POSTGRES_PASSWORD: qiuai
    ports:
      - "5432:5432"
    volumes:
      - ../../.local/docker/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qiuai -d qiuai_workos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qiuai-workos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ../../.local/docker/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
