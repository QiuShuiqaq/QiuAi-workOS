services:
  postgres:
    image: postgres:16-alpine
    container_name: qiuai-workos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qiuai_workos}
      POSTGRES_USER: ${POSTGRES_USER:-qiuai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qiuai_change_me}
    volumes:
      - ../../.local/docker/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qiuai} -d ${POSTGRES_DB:-qiuai_workos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qiuai-workos-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ../../.local/docker/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: server
    container_name: qiuai-workos-server
    restart: unless-stopped
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 4000
      NODE_ENV: production
      DATABASE_URL: ${SERVER_DATABASE_URL:-postgresql://${POSTGRES_USER:-qiuai}:${POSTGRES_PASSWORD:-qiuai_change_me}@postgres:5432/${POSTGRES_DB:-qiuai_workos}}
      REDIS_URL: ${SERVER_REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${SERVER_PUBLISHED_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/v1/health').then((r)=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: web
    container_name: qiuai-workos-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVER_INTERNAL_BASE_URL: ${SERVER_INTERNAL_BASE_URL:-http://server:4000}
      SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://server:4000}
    ports:
      - "${WEB_PUBLISHED_PORT:-3000}:3000"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/v1/health').then((r)=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
